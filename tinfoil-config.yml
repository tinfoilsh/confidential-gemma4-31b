cvm-version: 0.7.5
cpus: 16
memory: 65536
gpus: 1

models:
  - name: "gemma4-31b"
    repo: "google/gemma-4-31B-it@439edf5652646a0d1bd8b46bfdc1d3645761a445"
    mpk: "718354742d7b263c729ea11fbef3e744d61815c5b05043eea6ba0dd3ee44ea01_62578688000_27fb23ac-db9b-5e25-991a-90fdf2c9b3a7"

containers:
  - name: "gemma4-31b"
    image: "ghcr.io/tinfoilsh/confidential-gemma4-31b@sha256:a960ad6d8b09487438f506c8d4333b330457e7c8133d4260501f6ed5ddfa5695" # v0.0.7
    runtime: nvidia
    gpus: all
    ipc: host
    command: [
      "--model", "/tinfoil/mpk/mpk-718354742d7b263c729ea11fbef3e744d61815c5b05043eea6ba0dd3ee44ea01",
      "--tensor-parallel-size", "1",
      "--gpu-memory-utilization", "0.95",
      "--served-model-name", "gemma4-31b",
      "--enable-auto-tool-choice",
      "--tool-call-parser", "gemma4",
      "--reasoning-parser", "gemma4",
      "--limit-mm-per-prompt", "{\"image\": 4, \"audio\": 0, \"video\": 0}",
      "--chat-template", "examples/tool_chat_template_gemma4.jinja",
      "--default-chat-template-kwargs", "{\"enable_thinking\": true}",
      "--scheduling-policy", "priority",
      "--max-num-seqs", "32",
      "--port", "8001"
    ]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 30m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
    - /health
