cvm-version: 0.7.5
cpus: 16
memory: 65536
gpus: 1

models:
  - name: "gemma4-31b"
    repo: "google/gemma-4-31B-it@419b2efe421994fdfd3394e621983d4cc511cd4f"
    mpk: "0900ca6b913db0036792149d3ea5862986d66a6964b010e998f56fbb7e1276ab_62578683904_59fe9787-ed93-577a-9fd9-a7804c932a11"

containers:
  - name: "gemma4-31b"
    image: "ghcr.io/tinfoilsh/confidential-gemma4-31b@sha256:a960ad6d8b09487438f506c8d4333b330457e7c8133d4260501f6ed5ddfa5695" # v0.0.7
    runtime: nvidia
    gpus: all
    ipc: host
    command: [
      "--model", "/tinfoil/mpk/mpk-0900ca6b913db0036792149d3ea5862986d66a6964b010e998f56fbb7e1276ab",
      "--tensor-parallel-size", "1",
      "--gpu-memory-utilization", "0.95",
      "--served-model-name", "gemma4-31b",
      "--enable-auto-tool-choice",
      "--tool-call-parser", "gemma4",
      "--reasoning-parser", "gemma4",
      "--limit-mm-per-prompt", "{\"image\": 4, \"audio\": 1, \"video\": 1}",
      "--chat-template", "examples/tool_chat_template_gemma4.jinja",
      "--scheduling-policy", "priority",
      "--port", "8001"
    ]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      start_period: 30m

shim:
  upstream-port: 8001
  authenticated: true
  authenticated-endpoints:
    - /v1/chat/completions
    - /v1/responses
  paths:
    - /v1/chat/completions
    - /v1/models
    - /v1/responses
    - /metrics
    - /health
